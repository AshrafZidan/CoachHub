<p-dialog
  header="Approve Coach"
  [visible]="visible()"
  (onHide)="cancel()"
  [modal]="true"
  [resizable]="false"
  [style]="{ width: '440px' }"
  styleClass="approve-dialog"
>

  <!-- ─── Coach name subtitle ────────────────────────── -->
  <div class="dialog-subtitle">
    <i class="pi pi-user-check"></i>
    <span>Set session prices for <strong>{{ coach()?.fullNameEn }}</strong></span>
  </div>

  <!-- ─── Price Grid ─────────────────────────────────── -->
  <div class="price-grid">
    <div
      class="price-field"
      *ngFor="let field of priceFields"
    >
      <label [for]="field.key" class="field-label">
        {{ field.label }}
        <span class="required">*</span>
      </label>

      <div class="input-wrapper">
        <input
          [id]="field.key"
          type="number"
          pInputText
          class="price-input app-input"
          [class.invalid]="isFieldInvalid(field.key)"
          [value]="prices()[field.key] || ''"
          (input)="updatePrice(field.key, $any($event.target).value)"
          min="1"
          placeholder="0.00"
        />
        <span class="currency-badge">L.E</span>
      </div>
      <p-message
        *ngIf="isFieldInvalid(field.key)"
          severity="error"
          [text]="'Price must be greater than 0'"
          >
        </p-message>
    </div>
  </div>

  <!-- ─── Footer ─────────────────────────────────────── -->
  <ng-template pTemplate="footer">
      <button
        type="button"
        class="p-button p-button-secondary p-button-sm no-radius"
        (click)="cancel()"
        [disabled]="isLoading()"
      >
        Cancel
      </button>

      <button
        type="button"
        class="p-button p-button-success p-button-sm no-radius"
        (click)="approve()"
        [disabled]="!isValid() || isLoading()"
      >
        <span class="btn-spinner" *ngIf="isLoading()"></span>
        <span>{{ isLoading() ? 'Approving...' : 'Approve' }}</span>
      </button>
  </ng-template>

</p-dialog>
