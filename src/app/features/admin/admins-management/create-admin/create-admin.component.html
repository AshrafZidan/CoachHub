<div [formGroup]="form" class="form-container">
  <h4 style="margin-bottom: 20px;" class="page-title">Create Admin Account</h4>
  <!-- ─── Admin Code ───────────────────────────────── -->
  <div class="field w-50">
    <label>Full Name <span class="required">*</span></label>
    <input
      pInputText
      formControlName="fullName"
      placeholder="Enter fullName"
      class="w-full app-input no-radius"
      [class.input-invalid]="isFieldInvalid('fullName')"
    />
    <small class="p-error" *ngIf="isFieldInvalid('fullName')">
      {{ getFieldError('fullName') }}
    </small>
  </div>


    <div class="field w-50">
    <label>Email <span class="required">*</span></label>
    <input
      pInputText
      formControlName="email"
      placeholder="Enter email"
      class="w-full app-input no-radius"
      [class.input-invalid]="isFieldInvalid('email')"
    />
    <small class="p-error" *ngIf="isFieldInvalid('email')">
      {{ getFieldError('email') }}
    </small>
  </div>
  <div class="field w-50">
    <label>Permissions <span class="required">*</span></label>
    <p-multiselect
      formControlName="permissions"
      [options]="adminsPermissions"
      placeholder="Select permissions"
      optionLabel="nameEn"
      [maxSelectedLabels]="5"
      display="chip"
      class="w-full no-radius"
      appendTo="body"
      [class.input-invalid]="isFieldInvalid('permissions')"
    />
    <small class="p-error" *ngIf="isFieldInvalid('permissions')">
      {{ getFieldError('permissions') }}
    </small>
  </div>

  <!-- ─── Actions ──────────────────────────────────── -->
  <div class="form-actions w-50">
    <button
      type="button"
      pButton
      class="p-button p-button-secondary no-radius"
      (click)="resetForm()"
      [disabled]="isLoading()"
    >
      Reset
    </button>

    <button
      type="button"
      pButton
      class="p-button p-button-success no-radius"
      (click)="createAdminAccount()"
      [disabled]="isLoading() || form.invalid"
    >
      <span class="btn-spinner" *ngIf="isLoading()"></span>
      <span>{{ isLoading() ? 'Creating...' : 'Create Admin Account' }}</span>
    </button>
  </div>

</div>
