<aside class="sidebar" [class.collapsed]="isCollapsed()">

  <!-- ─── Logo ─────────────────────────────────────────── -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <img
        src="/assets/images/alt-logo.png"
        alt="CoachHub logo for admin dashboard sidebar navigation"
        onerror="this.style.display='none'"
      />
    </div>
  </div>

  <!-- ─── Main Navigation ──────────────────────────────── -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li *ngFor="let item of mainNavItems">
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="close()"
          [pTooltip]="item.label"
          [tooltipDisabled]="!isCollapsed()"
          tooltipPosition="right"
        >
          <i [class]="item.icon + ' nav-icon'"></i>
          <span class="nav-label" *ngIf="!isCollapsed()">{{ item.label }}</span>
          <span
            class="nav-badge"
            *ngIf="item.badge && !isCollapsed()"
            [style.background]="'var(--app-primary-color)'"
          >
            {{ item.badge }}
          </span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- ─── Settings Section ─────────────────────────────── -->
  <div class="sidebar-settings">
    <span class="settings-label" *ngIf="!isCollapsed()">SETTINGS</span>
    <ul class="nav-list">
      <li *ngFor="let item of settingsNavItems">
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          (click)="close()"
          [pTooltip]="item.label"
          [tooltipDisabled]="!isCollapsed()"
          tooltipPosition="right"
        >
          <i [class]="item.icon + ' nav-icon'"></i>
          <span class="nav-label" *ngIf="!isCollapsed()">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </div>

</aside>

<!-- ─── Mobile Overlay ────────────────────────────────── -->
<div
  class="sidebar-overlay"
  [class.visible]="!isCollapsed()"
  (click)="close()"
></div>
